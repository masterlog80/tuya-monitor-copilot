---
# ClusterIP Service (use with Ingress or NodePort for external access)
apiVersion: v1
kind: Service
metadata:
  name: tuya-monitor
  namespace: default
  labels:
    app: tuya-monitor
spec:
  selector:
    app: tuya-monitor
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP

---
